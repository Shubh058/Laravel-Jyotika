apiVersion: networking.k8s.io/v1
kind: Ingress
metadata:
  name: app-ingress
  annotations:
    nginx.ingress.kubernetes.io/rewrite-target: /$1
    nginx.ingress.kubernetes.io/ssl-redirect: "true"
spec:
  rules:
  - host: your-domain.com
    http:
      paths:
      - path: /(api/.*)
        pathType: Prefix
        backend:
          service:
            name: laravel-backend
            port:
              number: 9000
      - path: /(.*)
        pathType: Prefix
        backend:
          service:
            name: react-frontend
            port:
              number: 80
